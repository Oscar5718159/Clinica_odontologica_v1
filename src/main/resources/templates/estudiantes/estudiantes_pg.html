<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cubic Admin · Panel Estudiante</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../static/CSS/panel.css">
    <link rel="stylesheet" th:href="@{/CSS/panel.css}">
</head>
<body>          
    <!-- Sidebar -->    
    <div class="sidebar" id="sidebar">
        <div class="logo">
            <div>
                <h1>PANEL</h1>
                <h1>ESTUDIANTE</h1>
            </div>
            <button class="toggle-btn" id="toggleBtn">
                <i class="fas fa-bars"></i>
            </button>
        </div>
        
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search...">
        </div>
        
        <ul class="menu">
            <li onclick="loadPage('estudiantes/Registro-paciente/paciente-vista', 'Registro Paciente', 'nuevoPacienteFrame', this)">
                <i class="fas fa-address-card"></i>
                <span class="menu-text">Registro Paciente</span>
            </li>
            <li onclick="loadPage('/estudiantes/Revision/revision', 'Nueva Consulta', 'historiaClinicaFrame', this)">
                <i class="fas fa-file-signature"></i>
                <span class="menu-text">Nueva Consulta</span>
            </li>
            <li onclick="loadPage('/estudiantes/consentimiento/consentimiento-vista', 'Consentimiento', 'consentimientoFrame', this)">
                <i class="fas fa-file-contract"></i>
                <span class="menu-text">Consentimiento</span>
            </li>
            <li onclick="loadPage('/estudiantes/solicitud/insumos', 'Solicitud de Insumos', 'solicitudInsumosFrame', this)">
                <i class="fas fa-box"></i>
                <span class="menu-text">Solicitud de insumos</span>
            </li>
            <li onclick="loadPage('/estudiantes/seguimiento/seguimiento-vista', 'Seguimiento Tratamiento', 'seguimientoTratamientoFrame', this)">
                <i class="fas fa-edit"></i>
                <span class="menu-text">Seguimiento Tratamiento</span>
            </li>
            <li>
                <i class="fas fa-table"></i>
                <span class="menu-text">Tables</span>
                <span class="badge">35</span>
            </li>
        </ul>
        
        <button class="buy-btn">
            <i class="fas fa-shopping-cart"></i>
            <span class="buy-text">Buy Cubic Admin</span>
        </button>
        
        <div class="user-info">
            <div class="user-avatar">HG</div>
            <div class="user-details">
                <div class="user-name">Hanna Gover</div>
            </div>
        </div>
    </div>
    
    <!-- Main Content -->
    <div class="main-content">
        <div class="header">
            <h2 id="pageTitle">Registro Paciente</h2>
            <div class="user-menu">
                <i class="fas fa-bell"></i>
                <i class="fas fa-cog"></i>
                <i class="fas fa-user-circle"></i>
            </div>
        </div>
        
        <!-- Contenido de Registro de Paciente (activo por defecto) -->
        <div id="nuevoPacienteContent" class="content-area active">
            <iframe id="nuevoPacienteFrame" src="about:blank"></iframe>
        </div>

        <!-- Contenido de Nueva Consulta -->
        <div id="nuevaConsultaContent" class="content-area">
            <iframe id="historiaClinicaFrame" src="about:blank"></iframe>
        </div>

        <!-- Contenido de Solicitud de Insumos -->
        <div id="solicitudInsumosContent" class="content-area">
            <iframe id="solicitudInsumosFrame" src="about:blank"></iframe>
        </div>

        <!-- Contenido de Consentimiento -->
        <div id="consentimientoContent" class="content-area">
            <iframe id="consentimientoFrame" src="about:blank"></iframe>
        </div>

        <!-- Contenido de Seguimiento Tratamiento -->
        <div id="seguimientoContent" class="content-area">
            <iframe id="seguimientoTratamientoFrame" src="about:blank"></iframe>
        </div>
    </div>

    <script>
        // Toggle sidebar
        const toggleBtn = document.getElementById('toggleBtn');
        const sidebar = document.getElementById('sidebar');
        
        toggleBtn.addEventListener('click', function() {
            sidebar.classList.toggle('collapsed');
        });

        // Función principal para cargar páginas en iframes
        function loadPage(pageUrl, pageTitle, frameId, menuItem) {
            console.log('Cargando:', pageUrl, 'en iframe:', frameId);
            
            // 1. Ocultar todos los contenidos
            document.querySelectorAll('.content-area').forEach(content => {
                content.classList.remove('active');
            });
            
            // 2. Desactivar todos los items del menú
            document.querySelectorAll('.menu li').forEach(item => {
                item.classList.remove('active');
            });
            
            // 3. Activar el item del menú clickeado
            if (menuItem) {
                menuItem.classList.add('active');
            }
            
            // 4. Mapear frameId al ID del contenedor correspondiente
            const contentMap = {
                'nuevoPacienteFrame': 'nuevoPacienteContent',
                'historiaClinicaFrame': 'nuevaConsultaContent',
                'solicitudInsumosFrame': 'solicitudInsumosContent',
                'consentimientoFrame': 'consentimientoContent',
                'seguimientoTratamientoFrame': 'seguimientoContent'
            };
            
            const contentId = contentMap[frameId];
            if (!contentId) {
                console.error('No se encontró contentId para frameId:', frameId);
                return;
            }
            
            // 5. Activar el contenedor correspondiente
            document.getElementById(contentId).classList.add('active');
            
            // 6. Actualizar el título de la página
            document.getElementById('pageTitle').textContent = pageTitle;
            
            // 7. Cargar la URL en el iframe
            const frame = document.getElementById(frameId);
            if (frame) {
                frame.src = pageUrl;
            } else {
                console.error('Iframe no encontrado:', frameId);
            }
        }

        // Inicializar: cargar el primer elemento del menú (Registro Paciente)
        window.onload = function() {
            const firstMenuItem = document.querySelector('.menu li');
            if (firstMenuItem) {
                // Simular clic en el primer elemento
                firstMenuItem.click();
            }
        };
    </script>
</body>
</html>
